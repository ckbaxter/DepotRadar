version: "3.8"

services:
# ⚠ Service-Name hier ändern? → Auch in nginx.conf: proxy_pass http://<name>:5000 anpassen!
  backend:
    build: ./backend
    container_name: ath-tracker-backend
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://ath.apps.lan   # Anpassen auf eigene URL
    networks:
      - ath-net

  nginx:
    image: nginx:alpine
    container_name: ath-tracker-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - ath-net

networks:
  ath-net:
    driver: bridge
