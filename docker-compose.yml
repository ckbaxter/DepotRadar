version: "3.8"

services:
  backend:
    build: ./backend
    container_name: ath-tracker-backend
    restart: unless-stopped
    volumes:
      - ./data:/data        # Aktien, Einstellungen, Benachrichtigungs-Verlauf
      - ./config:/config:ro # Konfigurationsdatei (read-only)
    environment:
      - TZ=Europe/Berlin
    networks:
      - ath-net

  nginx:
    image: nginx:alpine
    container_name: ath-tracker-nginx
    restart: unless-stopped
    ports:
      - "8080:80"           # Erreichbar unter http://<server-ip>:8080
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - ath-net

networks:
  ath-net:
    driver: bridge
